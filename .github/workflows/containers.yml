name: release-containers

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  containers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (opsro)
        id: meta_opsro
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/opsro
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha

      - name: Docker metadata (opsro-codex)
        id: meta_codex
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/opsro-codex
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha

      - name: Docker metadata (opsro-claude)
        id: meta_claude
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/opsro-claude
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha

      - name: Build and push opsro
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_opsro.outputs.tags }}
          labels: ${{ steps.meta_opsro.outputs.labels }}

      - name: Build and push opsro-codex
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.agent
          build-args: |
            AGENT_PACKAGE=@openai/codex
            AGENT_BIN=codex
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_codex.outputs.tags }}
          labels: ${{ steps.meta_codex.outputs.labels }}

      - name: Build and push opsro-claude
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.agent
          build-args: |
            AGENT_PACKAGE=@anthropic-ai/claude-code
            AGENT_BIN=claude
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_claude.outputs.tags }}
          labels: ${{ steps.meta_claude.outputs.labels }}
